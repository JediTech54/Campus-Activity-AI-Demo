<body>
  <div id="root"></div>
  <script>
    const categories = [
      {id:'sports',label:'Sports & Fitness',icon:'🏸'},
      {id:'career',label:'Career Development',icon:'💼'},
      {id:'academic',label:'Academic Competition',icon:'🏆'},
      {id:'leisure',label:'Leisure & Entertainment',icon:'🎬'},

      {id:'arts',label:'Arts & Culture',icon:'🎨'},
      {id:'social',label:'Social Networking',icon:'👥'},
    ];
    const users = {
      student:{name:'Alex Chen',role:'Student',email:'alex.chen@campus.edu',school:'School of Management and Economics',year:'Year 3',avatar:'AC'},
      organizer:{name:'Mia Zhang',role:'Official Organizer',email:'mia.zhang@career.campus.edu',school:'Career Development Center',year:'Staff',avatar:'MZ'},
      admin:{name:'Jordan Lee',role:'Super Admin',email:'admin@campus.edu',school:'Student Affairs Office',year:'Administrator',avatar:'JL'}
    };
    let state = {
      page:'landing', role:'student', mobile:false, chat:false, selectedEvent:1,
      preferences:['sports','career','academic','leisure','volunteer','arts','social'],
      favorites:[1,3], joined:[6], listQuery:'', listCat:'all', adminFilter:'pending', calendarView:'month', submitted:false,
      events:[
        {id:1,type:'official',status:'approved',title:'AI Product Management Career Workshop',category:'career',organizer:'Career Development Center',date:'2026-04-28',time:'15:00–17:00',location:'Teaching Building A, Room 301',capacity:80,joined:54,image:'linear-gradient(135deg,#1d4ed8,#60a5fa)',description:'A hands-on workshop on how AI is reshaping product management roles, featuring alumni speakers from consulting, fintech, and consumer internet companies.',tags:['AI career','Alumni speaker','Resume tips'],aiSummary:'Best for students exploring AI product, consulting, and digital transformation careers.',moderationScore:98},
        {id:2,type:'official',status:'approved',title:'Campus Hackathon: Smart City Challenge',category:'academic',organizer:'Innovation Lab',date:'2026-05-03',time:'09:00–21:00',location:'Innovation Hub, 2/F',capacity:120,joined:93,image:'linear-gradient(135deg,#92400e,#f59e0b)',description:'Form teams, build prototypes, and pitch AI-powered smart city solutions. Mentors from software engineering, business analytics, and design will be available.',tags:['Team project','Prototype','Competition'],aiSummary:'Recommended for students who enjoy coding, pitching, and interdisciplinary teamwork.',moderationScore:97},
        {id:3,type:'buddy',status:'approved',title:'Badminton Partner Search: Intermediate Level',category:'sports',organizer:'Kevin Wong',date:'2026-04-26',time:'19:00–20:30',location:'University Sports Hall, Court 4',capacity:4,joined:2,image:'linear-gradient(135deg,#047857,#34d399)',description:'Looking for two intermediate players for doubles. Bring your own racket. Friendly match, no pressure.',tags:['Intermediate','Doubles','Evening sport'],aiSummary:'Strong match because your top preference is Sports & Fitness and the event is near campus housing.',moderationScore:91},
        {id:4,type:'buddy',status:'pending',title:'Library Group Study for Database Systems',category:'academic',organizer:'Sophia Liu',date:'2026-04-27',time:'14:00–17:00',location:'Library Collaboration Room B12',capacity:6,joined:1,image:'linear-gradient(135deg,#7c2d12,#fb923c)',description:'Preparing for the database systems midterm. We will review ER diagrams, SQL joins, normalization, and transaction concepts.',tags:['Study buddy','SQL','Midterm review'],aiSummary:'AI classified this as Academic Competition / Study Support with low content risk.',moderationScore:88},
        {id:5,type:'official',status:'approved',title:'Community Volunteering: Weekend Food Bank',category:'volunteer',organizer:'Volunteer Association',date:'2026-05-04',time:'10:00–13:00',location:'Shenzhen Community Center',capacity:40,joined:31,image:'linear-gradient(135deg,#be123c,#fb7185)',description:'Join the university volunteer team to help sort donated food packages and support local community families.',tags:['Community service','Weekend','Transportation provided'],aiSummary:'Good for students interested in public service and social impact activities.',moderationScore:99},
        {id:6,type:'buddy',status:'approved',title:'Friday Movie Night: Interstellar Rewatch',category:'leisure',organizer:'Emma Sun',date:'2026-04-24',time:'20:00–22:45',location:'Student Center Mini Theater',capacity:20,joined:14,image:'linear-gradient(135deg,#581c87,#c084fc)',description:'A relaxed movie night for sci-fi fans. We will watch Interstellar and have a short discussion after the screening.',tags:['Movie','Sci-fi','Social'],aiSummary:'AI tagged this as Leisure & Entertainment with a social networking component.',moderationScore:94},
        {id:7,type:'official',status:'approved',title:'Student Art Exhibition: City, Memory, Future',category:'arts',organizer:'Arts Society',date:'2026-05-06',time:'11:00–18:00',location:'University Gallery',capacity:200,joined:67,image:'linear-gradient(135deg,#be185d,#f9a8d4)',description:'A curated exhibition featuring student photography, digital art, and installation works on urban life and memory.',tags:['Exhibition','Student work','Digital art'],aiSummary:'Recommended for students who follow arts, culture, and creative campus experiences.',moderationScore:99},
        {id:8,type:'buddy',status:'rejected',title:'Late-night Off-campus Scooter Race',category:'leisure',organizer:'Anonymous Student',date:'2026-04-29',time:'23:30–01:00',location:'Off-campus road near East Gate',capacity:12,joined:0,image:'linear-gradient(135deg,#334155,#64748b)',description:'Rejected example: risky off-campus racing activity. Included to demonstrate AI-assisted moderation and admin review.',tags:['Safety risk','Rejected','Off-campus'],aiSummary:'AI detected possible safety risk and recommended rejection for admin review.',moderationScore:21}
      ]
    };
    const $ = id => document.getElementById(id);
    const esc = s => String(s ?? '').replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
    const cat = id => categories.find(c=>c.id===id) || categories[0];
    const pillClass = status => status==='approved'?'pill pillGreen':status==='rejected'?'pill pillRose':'pill pillAmber';
    function setPage(page){state.page=page;state.mobile=false;state.submitted=false;render()}
    function setRole(role){state.role=role;render()}
    function toggleMobile(){state.mobile=!state.mobile;render()}
    function toggleChat(){state.chat=!state.chat;render()}
    function pendingCount(){return state.events.filter(e=>e.type==='buddy'&&e.status==='pending').length}
    function logo(){return `<div class="logo"><div class="logoMark">✨</div><div><div class="logoTitle">CampusMatch AI</div><div class="logoSub">Activity discovery platform</div></div></div>`}
    function sidebar(){const nav=[['landing','✨','Landing'],['home','⭐','Personalized Home'],['official','🏛️','Official Events'],['buddy','👥','Activity Buddy'],['calendar','📅','Calendar'],['favorites','♡','Favorites'],['publish','＋','Publish Event'],['profile','👤','Personal Center'],['admin','🛡️','Admin Review',pendingCount()]]; const u=users[state.role]; return `<aside class="sidebar"><div>${logo()}<div class="nav">${nav.map(n=>`<button class="${state.page===n[0]?'active':''}" onclick="setPage('${n[0]}')"><span class="navLeft"><span>${n[1]}</span>${n[2]}</span>${n[3]?`<span class="badge">${n[3]}</span>`:''}</button>`).join('')}</div></div><div class="userBox"><div class="userHead"><div class="avatar">${u.avatar}</div><div><div class="userName">${u.name}</div><div class="userRole">${u.role}</div></div></div><div class="roleTabs">${Object.keys(users).map(r=>`<button class="${state.role===r?'active':''}" onclick="setRole('${r}')">${r}</button>`).join('')}</div></div></aside>`}
    function mobileBars(){return `<div class="mobileBar">${logo()}<button class="hamburger" onclick="toggleMobile()">☰</button></div><div class="mobileMenu ${state.mobile?'show':''}">${sidebar()}</div>`}
    function categoryIcon(category){const c=cat(category);return `<div class="catIcon bg-${c.id}">${c.icon}</div>`}
    function eventCard(e){const c=cat(e.category), rank=state.preferences.indexOf(e.category)+1, fill=Math.min(100,Math.round(e.joined/e.capacity*100)), saved=state.favorites.includes(e.id), joined=state.joined.includes(e.id);return `<div class="card eventCard"><div class="eventImage" style="background:${e.image}"><span class="pill pillDark">${e.type==='official'?'🏛️ Official':'👥 Buddy'}</span><button class="heartBtn ${saved?'saved':''}" onclick="toggleFavorite(${e.id})">${saved?'♥':'♡'}</button></div><div class="cardBody"><div class="eventHead">${categoryIcon(e.category)}<div><div class="eventTitle">${esc(e.title)}</div><div class="eventMeta"><span>🕒 ${e.date} · ${e.time}</span><span>📍 ${esc(e.location)}</span></div></div></div><p class="eventDesc">${esc(e.description)}</p><div class="aiNote">✨ ${rank>0?`Recommended because you ranked ${c.label} #${rank}.`:esc(e.aiSummary)}</div><div class="tags">${e.tags.map(t=>`<span class="pill pillSlate">${esc(t)}</span>`).join('')}</div><div class="progressLabel"><span>${e.joined}/${e.capacity} joined</span><span>${fill}% full</span></div><div class="progress"><i style="width:${fill}%"></i></div><div class="cardActions"><button class="btn btnSoft" onclick="openDetail(${e.id})">Details</button><button class="btn ${joined?'btnGreen':'btnPrimary'}" onclick="joinEvent(${e.id})">${joined?'Joined':e.type==='official'?'Sign up':'Join'}</button></div></div></div>`}
    function openDetail(id){state.selectedEvent=id;setPage('detail')}
    function toggleFavorite(id){state.favorites=state.favorites.includes(id)?state.favorites.filter(x=>x!==id):[...state.favorites,id];render()}
    function joinEvent(id){if(!state.joined.includes(id)){state.joined.push(id);state.events=state.events.map(e=>e.id===id&&e.joined<e.capacity?{...e,joined:e.joined+1}:e)}render()}
    function landing(){const approved=state.events.filter(e=>e.status==='approved').slice(0,4);return `<section class="hero"><div class="heroInner"><div><span class="pill pillDark">✨ AI-powered campus activity discovery</span><h1>Find the right campus event before you even search.</h1><p>A polished prototype for official university events and student-created activity buddy events, with ranked preference onboarding, AI recommendations, and admin moderation.</p><div class="btnRow"><button class="btn btnWhite" onclick="setPage('register')">Start demo registration</button><button class="btn btnGhostDark" onclick="setPage('home')">View personalized home</button></div><div class="heroStats"><div class="heroStat"><b>3</b><span>demo roles</span></div><div class="heroStat"><b>12</b><span>core pages</span></div><div class="heroStat"><b>AI</b><span>recommendation + moderation</span></div></div></div><div class="phoneMock"><div class="phoneScreen"><div style="display:flex;justify-content:space-between;gap:12px;align-items:center"><div><div style="font-size:13px;color:var(--slate-500);font-weight:900">Today on campus</div><div style="font-size:26px;font-weight:950;letter-spacing:-.04em">Smart feed</div></div><span class="pill pillIndigo">✨ AI ranked</span></div>${approved.map((e,i)=>`<div class="feedItem"><div class="feedLine">${categoryIcon(e.category)}<div><div class="feedTitle"><span style="color:var(--indigo-700)">#${i+1}</span> ${esc(e.title)}</div><div class="feedMeta">${e.date} · ${esc(e.location)}</div><div class="aiNote">✨ ${esc(e.aiSummary)}</div></div></div></div>`).join('')}</div></div></div></section><div class="grid3"><div class="feature"><div class="featureIcon">🎓</div><h3>Personalized onboarding</h3><p>Students rank activity categories, and the homepage explains why each event is recommended.</p></div><div class="feature"><div class="featureIcon">📅</div><h3>Unified event calendar</h3><p>Official and buddy events appear together in month/week views with capacity and status indicators.</p></div><div class="feature"><div class="featureIcon">🛡️</div><h3>Admin moderation</h3><p>Student-created events can be approved or rejected with AI risk indicators and suggested labels.</p></div></div>`}
    function auth(type){const login=type==='login';return `<div class="auth"><div class="authLeft">${logo()}<h2>${login?'Welcome back to your campus feed.':'Create your campus activity profile.'}</h2><p>${login?'This mock login lets you enter the personalized demo immediately. Choose a role from the sidebar after entering.':'Registration is mandatory because user profiles and ranked preferences drive AI recommendations.'}</p><div class="aiNote" style="background:rgba(255,255,255,.1);color:#e2e8f0">✨ AI uses ranked interests, sign-up history, and event metadata to build a transparent recommendation feed.</div></div><div class="authRight"><h3>${login?'Login':'Registration'}</h3><div style="color:var(--slate-500);font-size:14px;font-weight:700">Demo form with simulated success state.</div><div class="formStack">${!login?'<input value="Alex Chen" placeholder="Full name" />':''}<input value="alex.chen@campus.edu" placeholder="Campus email" /><input type="password" value="campusdemo" placeholder="Password" />${!login?'<select><option>Student</option><option>Official organizer</option></select>':''}<button class="btn btnPrimary" onclick="setPage('${login?'home':'preferences'}')">${login?'Login to demo':'Continue to preference ranking'}</button><button class="btn btnSoft" onclick="setPage('${login?'register':'login'}')">${login?'Create a new account':'Already have an account? Login'}</button></div></div></div>`}
    function movePref(i,dir){const j=i+dir;if(j<0||j>=state.preferences.length)return;[state.preferences[i],state.preferences[j]]=[state.preferences[j],state.preferences[i]];render()}
    function preferences(){return `<div class="prefPage"><div class="sectionHeader"><div><span class="pill pillIndigo">✨ AI onboarding</span><h2>Rank your activity interests</h2><p>This demo uses up/down controls so the ranking state is visible and easy to present.</p></div><button class="btn btnPrimary" onclick="setPage('home')">Save preferences</button></div>${state.preferences.map((id,i)=>{const c=cat(id);return `<div class="rankItem"><div class="rankNo">#${i+1}</div>${categoryIcon(id)}<div class="rankMain"><b>${c.label}</b><span>Used as a ranking weight in the recommendation score.</span></div><div class="rankBtns"><button onclick="movePref(${i},-1)">▲</button><button onclick="movePref(${i},1)">▼</button></div></div>`}).join('')}</div>`}
    function header(eyebrow,title,body,action=''){return `<div class="sectionHeader"><div>${eyebrow?`<span class="pill pillBlack">${eyebrow}</span>`:''}<h2>${title}</h2>${body?`<p>${body}</p>`:''}</div>${action}</div>`}
    function home(){const rec=state.events.filter(e=>e.status==='approved').map(e=>({...e,score:100-state.preferences.indexOf(e.category)*12+(e.type==='buddy'?4:0)})).sort((a,b)=>b.score-a.score).slice(0,6);const top=cat(state.preferences[0]);return `<div class="homeTop"><div class="homeHero"><span class="pill pillDark">✨ Personalized by ranked preferences</span><h1>Your campus plan for this week is ready.</h1><p>The feed is ranked by your questionnaire, current capacity, event type, and AI-generated tags. Recommendation explanations are intentionally visible for presentation.</p><div class="homeStats"><div class="homeStat"><b>${rec.length}</b><div>recommended events</div></div><div class="homeStat"><b>${state.favorites.length}</b><div>saved favorites</div></div><div class="homeStat"><b>${state.joined.length}</b><div>joined events</div></div></div></div><div class="panel prefPanel"><div style="display:flex;gap:14px;align-items:center">${categoryIcon(top.id)}<div><div style="font-size:14px;color:var(--slate-500);font-weight:900">Top preference</div><div style="font-size:22px;font-weight:950">${top.label}</div></div></div>${state.preferences.slice(0,5).map((id,i)=>`<div class="prefLine"><span>#${i+1} ${cat(id).label}</span><span style="color:var(--slate-400)">weight ${100-i*12}</span></div>`).join('')}<button class="btn btnPrimary" style="width:100%;margin-top:14px" onclick="setPage('preferences')">Edit ranking</button></div></div>${header('Recommended for you','AI-ranked event feed','Each card shows a visible recommendation explanation, so your professor can immediately see where AI is used in the product.','<button class="btn btnWhite" onclick="setPage(\'official\')">Browse all events</button>')}<div class="cardGrid">${rec.map(eventCard).join('')}</div>${chatWidget()}`}
    function listPage(type,title){const filtered=state.events.filter(e=>{const q=state.listQuery.toLowerCase().trim();return e.status==='approved' && (type==='all'||e.type===type) && (state.listCat==='all'||e.category===state.listCat) && (!q || [e.title,e.location,e.organizer,e.description,...e.tags].join(' ').toLowerCase().includes(q))});return `${header(type==='official'?'Official campus events':'Student-created buddy events',title,type==='official'?'Events published by schools, clubs, and official organizations.':'Find partners for sports, study, entertainment, outings, and small group activities.','<button class="btn btnPrimary" onclick="setPage(\'publish\')">＋ Publish buddy event</button>')}<div class="filters"><input id="searchInput" value="${esc(state.listQuery)}" placeholder="Search events, locations, tags..." oninput="state.listQuery=this.value;render()" /><select onchange="state.listCat=this.value;render()"><option value="all">All categories</option>${categories.map(c=>`<option value="${c.id}" ${state.listCat===c.id?'selected':''}>${c.label}</option>`).join('')}</select></div>${filtered.length?`<div class="cardGrid">${filtered.map(eventCard).join('')}</div>`:`<div class="empty"><b>No matching events</b>Try another category or search term.</div>`}`}
    function detail(){const e=state.events.find(x=>x.id===state.selectedEvent)||state.events[0], c=cat(e.category), rank=state.preferences.indexOf(e.category)+1, saved=state.favorites.includes(e.id), joined=state.joined.includes(e.id), fill=Math.min(100,Math.round(e.joined/e.capacity*100));return `<button class="btn btnWhite" style="margin-bottom:14px" onclick="setPage('home')">← Back to home</button><div class="detail"><div class="detailTop" style="background:${e.image}"><span class="pill pillDark">${e.type==='official'?'Official Event':'Activity Buddy Event'}</span><span class="pill pillDark">✨ AI summary available</span></div><div class="detailBody"><div><div style="display:flex;gap:16px;align-items:flex-start">${categoryIcon(e.category)}<div><h1>${esc(e.title)}</h1><div class="eventMeta" style="font-size:14px"><span>🕒 ${e.date} · ${e.time}</span><span>📍 ${esc(e.location)}</span><span>👥 ${e.joined}/${e.capacity} joined</span></div></div></div><p style="font-size:16px;line-height:1.8;color:var(--slate-700);margin-top:22px">${esc(e.description)}</p><div class="aiNote" style="background:var(--indigo-100);color:var(--indigo-700);padding:16px;border-radius:24px">✨ This event is recommended because ${c.label} is ranked #${rank} in your preference questionnaire. The AI also detected matching tags: ${e.tags.join(', ')}.</div><div class="tags">${e.tags.map(t=>`<span class="pill pillSlate">${esc(t)}</span>`).join('')}</div></div><div class="sideBox"><div style="font-size:14px;font-weight:950;color:var(--slate-500)">Organizer</div><div style="font-size:22px;font-weight:950;margin-top:4px">${esc(e.organizer)}</div><div class="smallBox"><div style="font-size:14px;font-weight:900;color:var(--slate-500)">Capacity status</div><div style="font-size:34px;font-weight:950">${e.joined}/${e.capacity}</div><div class="progress"><i style="width:${fill}%"></i></div></div>${e.type==='buddy'?`<div class="smallBox"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:14px;font-weight:900;color:var(--slate-500)">AI moderation score</div><div style="font-size:28px;font-weight:950">${e.moderationScore}/100</div></div><div style="font-size:24px">${e.moderationScore>=80?'✅':'✕'}</div></div></div>`:''}<button class="btn ${joined?'btnGreen':'btnPrimary'}" style="width:100%;margin-top:14px" onclick="joinEvent(${e.id})">${joined?'Joined successfully':e.type==='official'?'Sign up for event':'Join this buddy event'}</button><button class="btn btnWhite" style="width:100%;margin-top:8px" onclick="toggleFavorite(${e.id})">${saved?'Remove from favorites':'Save to favorites'}</button></div></div></div>`}
    function publish(){if(state.submitted)return `<div class="prefPage" style="text-align:center;max-width:760px"><div style="font-size:50px">✅</div><h2>Event submitted for review</h2><p style="color:var(--slate-600);line-height:1.7">The buddy event is now pending admin moderation. In the real product, this would create a database record and notify admins.</p><div class="aiNote" style="text-align:left;background:var(--indigo-100);color:var(--indigo-700)">✨ AI pre-check: category inferred, summary generated, and moderation score assigned before human review.</div><div class="btnRow" style="justify-content:center"><button class="btn btnPrimary" onclick="setPage('admin')">Open admin dashboard</button><button class="btn btnSoft" onclick="setPage('buddy')">Back to buddy events</button></div></div>`;return `<div class="publishGrid"><div class="panel" style="padding:26px">${header('Student publishing','Publish a buddy event','Student-created events enter pending status first and require admin approval before public listing.')}<div class="formStack"><input id="pTitle" value="Tennis Practice Partner: Beginner Friendly"><select id="pCat">${categories.map(c=>`<option value="${c.id}" ${c.id==='sports'?'selected':''}>${c.label}</option>`).join('')}</select><input id="pDate" value="2026-05-08"><input id="pTime" value="18:30–20:00"><input id="pLocation" value="Outdoor Tennis Court 2"><input id="pCapacity" type="number" value="4"><textarea id="pDesc" rows="5">Looking for beginner-level tennis partners to practice rallies and basic serves. Friendly and casual session.</textarea><button class="btn btnPrimary" onclick="submitEvent()">Submit for review</button></div></div><div class="panel aiPreview"><span class="pill pillIndigo">✨ AI publishing assistant</span><h2 style="letter-spacing:-.04em">Live AI preview</h2><div class="smallBox" style="background:var(--slate-50)"><b>Suggested category</b><div style="margin-top:8px">Sports & Fitness</div></div><div class="smallBox" style="background:var(--slate-50)"><b>Generated smart tags</b><div class="tags"><span class="pill pillSlate">AI tagged</span><span class="pill pillSlate">Campus activity</span><span class="pill pillSlate">Low risk</span></div></div><div class="aiNote" style="background:var(--emerald-100);color:var(--emerald-700)">✅ No prohibited language detected. Estimated approval confidence: 86/100.</div></div></div>`}
    function submitEvent(){const id=Date.now(), catId=$('pCat').value;state.events.unshift({id,type:'buddy',status:'pending',organizer:'Alex Chen',joined:1,image:'linear-gradient(135deg,#0f766e,#5eead4)',tags:['AI tagged',cat(catId).label,'Pending review'],aiSummary:`AI classified this event as ${cat(catId).label}. Low-risk language detected; suggested approval after admin review.`,moderationScore:86,title:$('pTitle').value,category:catId,date:$('pDate').value,time:$('pTime').value,location:$('pLocation').value,capacity:Number($('pCapacity').value),description:$('pDesc').value});state.submitted=true;render()}
    function calendar(){const approved=state.events.filter(e=>e.status==='approved');const week=approved.filter(e=>['2026-04-24','2026-04-26','2026-04-27','2026-04-28'].includes(e.date));const days=Array.from({length:35},(_,i)=>i+1);return `${header('Unified calendar','Month / week event calendar','Official and buddy events are displayed together.','<div class="roleTabs" style="width:180px"><button class="'+(state.calendarView==='month'?'active':'')+'" onclick="state.calendarView=\'month\';render()">Month</button><button class="'+(state.calendarView==='week'?'active':'')+'" onclick="state.calendarView=\'week\';render()">Week</button></div>')}${state.calendarView==='month'?`<div class="calendarPanel"><div style="display:flex;justify-content:space-between;margin-bottom:14px"><h3 style="margin:0;font-size:22px">April / May 2026</h3><span class="pill pillSlate">Demo calendar</span></div><div class="weekdays">${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>`<div>${d}</div>`).join('')}</div><div class="monthGrid">${days.map(d=>{const date=d<=30?`2026-04-${String(d).padStart(2,'0')}`:`2026-05-${String(d-30).padStart(2,'0')}`;const ev=approved.filter(e=>e.date===date);return `<div class="day"><div class="dayNo">${d<=30?d:d-30}</div>${ev.slice(0,2).map(e=>`<button class="dayEvent" onclick="openDetail(${e.id})">${esc(e.title)}</button>`).join('')}</div>`}).join('')}</div></div>`:`<div class="weekList">${week.map(e=>`<button class="weekItem" onclick="openDetail(${e.id})"><div class="dateBlock"><div style="font-size:12px;font-weight:900">${e.date}</div><div style="font-size:20px;font-weight:950">${e.time.split('–')[0]}</div></div><div style="flex:1"><div style="font-size:18px;font-weight:950">${esc(e.title)}</div><div style="color:var(--slate-500);font-size:14px;margin-top:4px">${esc(e.location)}</div></div><span class="pill ${e.type==='official'?'pillIndigo':'pillGreen'}">${e.type}</span></button>`).join('')}</div>`}`}
    function favorites(){const saved=state.events.filter(e=>state.favorites.includes(e.id));return `${header('Saved events','Favorites','Students can save events first, then decide later. This state is simulated locally in the prototype.')}${saved.length?`<div class="cardGrid">${saved.map(eventCard).join('')}</div>`:`<div class="empty"><b>No favorites yet</b>Click the heart icon on any event card to save it here.</div>`}`}
    function profile(){const u=users[state.role], joined=state.events.filter(e=>state.joined.includes(e.id));return `<div class="publishGrid"><div class="panel" style="padding:26px"><div style="display:flex;gap:16px;align-items:center"><div class="avatar" style="width:80px;height:80px;border-radius:28px;font-size:24px">${u.avatar}</div><div><h2 style="margin:0;font-size:34px;letter-spacing:-.05em">${u.name}</h2><div style="color:var(--slate-500);font-weight:800;margin-top:4px">${u.email}</div></div></div>${[['Role',u.role],['School / Office',u.school],['Status',u.year]].map(r=>`<div class="prefLine"><span>${r[0]}</span><span>${r[1]}</span></div>`).join('')}<button class="btn btnSoft" style="width:100%;margin-top:16px" onclick="setPage('login')">↩ Simulate logout</button></div><div><div class="panel" style="padding:24px"><h3>Preference profile</h3><div class="grid3" style="grid-template-columns:repeat(2,1fr);margin-top:12px">${state.preferences.map((id,i)=>`<div class="prefLine"><span>#${i+1} ${cat(id).label}</span></div>`).join('')}</div></div><div class="grid3" style="margin-top:16px"><div class="feature"><h3>${state.joined.length}</h3><p>Joined</p></div><div class="feature"><h3>${state.favorites.length}</h3><p>Favorites</p></div><div class="feature"><h3>92%</h3><p>AI match score</p></div></div><div class="panel" style="padding:24px;margin-top:16px"><h3>Upcoming joined events</h3>${joined.length?joined.map(e=>`<div class="prefLine"><span>${esc(e.title)}</span><span>${e.date}</span></div>`).join(''):'<p style="color:var(--slate-500)">No joined events yet.</p>'}</div></div></div>`}
    function updateStatus(id,status){state.events=state.events.map(e=>e.id===id?{...e,status}:e);render()}
    function admin(){const list=state.events.filter(e=>e.type==='buddy'&&(state.adminFilter==='all'||e.status===state.adminFilter));return `${header('Super admin','Moderation dashboard','Admins review student-created buddy events. AI provides category suggestions, summaries, and a moderation risk score, but final approval remains human-controlled.',`<select style="max-width:220px" onchange="state.adminFilter=this.value;render()"><option value="pending" ${state.adminFilter==='pending'?'selected':''}>Pending</option><option value="approved" ${state.adminFilter==='approved'?'selected':''}>Approved</option><option value="rejected" ${state.adminFilter==='rejected'?'selected':''}>Rejected</option><option value="all" ${state.adminFilter==='all'?'selected':''}>All buddy events</option></select>`)}${list.length?list.map(e=>`<div class="adminItem"><div class="adminTop"><div class="adminInfo"><div class="catIcon ${e.moderationScore<60?'bg-volunteer':'bg-sports'}">${e.moderationScore<60?'✕':'✅'}</div><div><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><h3 style="margin:0;font-size:22px">${esc(e.title)}</h3><span class="${pillClass(e.status)}">${e.status}</span></div><p style="color:var(--slate-600);line-height:1.6;max-width:780px">${esc(e.description)}</p><div style="color:var(--slate-500);font-size:13px;font-weight:800">${esc(e.organizer)} · ${e.date} · ${esc(e.location)}</div></div></div><div class="moderationBox"><div style="display:flex;justify-content:space-between;font-weight:950"><span>AI moderation</span><span>${e.moderationScore}/100</span></div><div class="progress" style="margin-top:10px"><i style="width:${e.moderationScore}%;background:${e.moderationScore<60?'var(--rose-600)':'var(--emerald-600)'}"></i></div><p style="font-size:12px;line-height:1.6;color:var(--slate-600)">${esc(e.aiSummary)}</p></div></div><div class="btnRow" style="margin-top:14px"><button class="btn btnGreen" onclick="updateStatus(${e.id},'approved')">✅ Approve</button><button class="btn btnRose" onclick="updateStatus(${e.id},'rejected')">✕ Reject</button><button class="btn btnSoft" onclick="updateStatus(${e.id},'pending')">Move to pending</button></div></div>`).join(''):`<div class="empty"><b>No events in this queue</b>Change the filter to see approved, rejected, or all buddy events.</div>`}`}
    function chatWidget(){return `<div class="chat">${state.chat?`<div class="chatPanel"><b>✨ Campus AI Assistant</b><div class="chatBubble">Try: “Find me sports events this week.”</div><div class="chatBubble" style="background:var(--indigo-100);color:var(--indigo-700)">Based on your #1 preference, I recommend the badminton partner event on Apr 26.</div></div>`:''}<button class="chatBtn" onclick="toggleChat()">💬</button></div>`}
    function pageContent(){switch(state.page){case 'landing':return landing();case 'login':return auth('login');case 'register':return auth('register');case 'preferences':return preferences();case 'home':return home();case 'official':return listPage('official','Official campus events');case 'buddy':return listPage('buddy','Activity buddy events');case 'detail':return detail();case 'publish':return publish();case 'calendar':return calendar();case 'favorites':return favorites();case 'profile':return profile();case 'admin':return admin();default:return landing();}}
    function render(){document.getElementById('root').innerHTML=`<div class="app">${sidebar()}<main class="content">${mobileBars()}<div class="page">${pageContent()}</div></main></div>`}
    render();
  </script>
</body>
</html>
